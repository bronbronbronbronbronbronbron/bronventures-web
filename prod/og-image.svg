<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Name -->
  <text x="80" y="340" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif" font-size="96" font-weight="900" fill="#f5f5f7" letter-spacing="-4">Daniel Bron<tspan fill="#2563eb">.</tspan></text>
  <!-- URL -->
  <text x="80" y="530" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" font-weight="700" fill="#3a3a3e" letter-spacing="1">bronventures.com</text>
  <!-- Bottom accent -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)"/>
</svg>
