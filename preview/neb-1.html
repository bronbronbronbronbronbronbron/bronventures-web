<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nebula 1: Deep Field</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#eeeef0;-webkit-text-fill-color:#eeeef0;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
::selection{background:rgba(37,99,235,.3)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.hero{min-height:100vh;display:flex;align-items:center;padding:0 80px;position:relative;overflow:hidden}
@media(max-width:734px){.hero{padding:100px 24px 60px;min-height:100svh;flex-direction:column;justify-content:center}}
.hero-inner{max-width:600px;opacity:0;animation:fadeIn .8s cubic-bezier(.22,1,.36,1) .15s forwards;position:relative;z-index:2}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.hero-name{font-size:clamp(56px,10vw,120px);font-weight:900;letter-spacing:-.07em;line-height:.88;margin-bottom:32px}
.hero-name .dot{color:#2563eb;-webkit-text-fill-color:#2563eb}
.hero-data{display:grid;grid-template-columns:1fr 1fr;gap:0 40px;margin-bottom:32px}
@media(max-width:580px){.hero-data{grid-template-columns:1fr}}
.hd-row{display:flex;flex-direction:column;gap:3px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.hd-label{font-size:9px;font-weight:700;color:#3a3a3e;-webkit-text-fill-color:#3a3a3e;text-transform:uppercase;letter-spacing:1.5px}
.hd-value{font-size:14px;font-weight:600;color:#86868b;-webkit-text-fill-color:#86868b}
.hd-value a{color:#2563eb;-webkit-text-fill-color:#2563eb;transition:opacity .3s}
.hd-value a:hover{opacity:.7}
.hero-cta{display:flex;gap:10px;flex-wrap:wrap}
.btn-p{background:linear-gradient(135deg,#2563eb,#6366f1);color:#fff;-webkit-text-fill-color:#fff;padding:14px 28px;border-radius:10px;font-size:14px;font-weight:600;transition:all .3s cubic-bezier(.22,1,.36,1)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,99,235,.3)}
.btn-gh{color:#71717a;-webkit-text-fill-color:#71717a;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;border:1px solid rgba(255,255,255,.06);transition:all .3s cubic-bezier(.22,1,.36,1)}
.btn-gh:hover{color:#eeeef0;-webkit-text-fill-color:#eeeef0;border-color:rgba(99,102,241,.2);transform:translateY(-2px)}

/* ═══ NEBULA 1: DEEP FIELD ═══
   Dense cluster of 7 blobs at varying sizes and blur levels.
   Layered depth: far blobs are huge + very blurry, close ones 
   are smaller + sharper. Creates real depth like Hubble deep field.
   Tight color palette: pure blues + indigos only. No purple drift. */
.neb-wrap{position:absolute;right:2%;top:50%;transform:translateY(-50%);width:500px;height:500px;opacity:0;animation:nebIn 2s cubic-bezier(.22,1,.36,1) .2s forwards}
@keyframes nebIn{from{opacity:0;transform:translateY(-50%) scale(.75)}to{opacity:1;transform:translateY(-50%) scale(1)}}
@media(max-width:900px){.neb-wrap{position:relative;right:auto;top:auto;transform:none;width:300px;height:300px;margin:48px auto 0;animation-name:nebInMob}@keyframes nebInMob{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:none}}}

.nb{position:absolute;border-radius:50%;will-change:transform}

/* Far layer - huge, very blurry, low opacity */
.nb-f1{width:90%;height:75%;top:5%;left:5%;background:radial-gradient(ellipse at 40% 45%,rgba(30,64,175,.22),transparent 70%);filter:blur(80px);animation:drift1 16s ease-in-out infinite}
.nb-f2{width:70%;height:85%;top:10%;left:20%;background:radial-gradient(ellipse at 55% 50%,rgba(67,56,202,.18),transparent 65%);filter:blur(70px);animation:drift2 20s ease-in-out infinite}

/* Mid layer - medium blur, richer color */
.nb-m1{width:50%;height:45%;top:20%;left:25%;background:radial-gradient(ellipse,rgba(37,99,235,.3),transparent 70%);filter:blur(45px);animation:drift3 12s ease-in-out infinite}
.nb-m2{width:40%;height:50%;top:30%;left:35%;background:radial-gradient(ellipse,rgba(99,102,241,.28),transparent 65%);filter:blur(40px);animation:drift4 14s ease-in-out infinite}
.nb-m3{width:35%;height:35%;top:15%;left:40%;background:radial-gradient(ellipse,rgba(79,70,229,.25),transparent 65%);filter:blur(35px);animation:drift5 10s ease-in-out infinite}

/* Near layer - smaller, sharper, brighter */
.nb-n1{width:22%;height:22%;top:35%;left:38%;background:radial-gradient(circle,rgba(129,140,248,.3),rgba(99,102,241,.1) 60%,transparent);filter:blur(18px);animation:drift6 7s ease-in-out infinite}
.nb-n2{width:14%;height:14%;top:42%;left:44%;background:radial-gradient(circle,rgba(165,180,252,.25),transparent 70%);filter:blur(10px);animation:pulse1 5s ease-in-out infinite}

/* Core - tiny bright hotspot */
.nb-core{width:8%;height:8%;top:44%;left:46%;background:radial-gradient(circle,rgba(199,210,254,.3),rgba(165,180,252,.1) 50%,transparent);filter:blur(6px);animation:pulse2 4s ease-in-out infinite}

@keyframes drift1{0%,100%{transform:translate(0,0) scale(1) rotate(0deg)}33%{transform:translate(25px,-20px) scale(1.08) rotate(2deg)}66%{transform:translate(-15px,25px) scale(.95) rotate(-1deg)}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1) rotate(0deg)}40%{transform:translate(-30px,15px) scale(1.12) rotate(-3deg)}75%{transform:translate(20px,-25px) scale(.92) rotate(2deg)}}
@keyframes drift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,18px) scale(1.1)}}
@keyframes drift4{0%,100%{transform:translate(0,0) scale(1)}35%{transform:translate(-18px,-20px) scale(1.15)}70%{transform:translate(12px,15px) scale(.9)}}
@keyframes drift5{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(25px,-12px) scale(1.08)}}
@keyframes drift6{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(-10px,15px) scale(1.2)}80%{transform:translate(8px,-8px) scale(.95)}}
@keyframes pulse1{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.9;transform:scale(1.3)}}
@keyframes pulse2{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}

.option-label{position:fixed;bottom:16px;left:16px;background:#1c1c1e;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 16px;font-size:11px;font-weight:700;color:#2563eb;-webkit-text-fill-color:#2563eb;z-index:100}
.back{position:fixed;bottom:16px;right:16px;background:#1c1c1e;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 16px;font-size:11px;font-weight:700;color:#55555f;-webkit-text-fill-color:#55555f;z-index:100;transition:all .3s}
.back:hover{color:#eeeef0;-webkit-text-fill-color:#eeeef0}
</style>
</head>

</div>

</body>
</html>
