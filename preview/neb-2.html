<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nebula 2: Aurora Drift</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#eeeef0;-webkit-text-fill-color:#eeeef0;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
::selection{background:rgba(37,99,235,.3)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.hero{min-height:100vh;display:flex;align-items:center;padding:0 80px;position:relative;overflow:hidden}
@media(max-width:734px){.hero{padding:100px 24px 60px;min-height:100svh;flex-direction:column;justify-content:center}}
.hero-inner{max-width:600px;opacity:0;animation:fadeIn .8s cubic-bezier(.22,1,.36,1) .15s forwards;position:relative;z-index:2}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.hero-name{font-size:clamp(56px,10vw,120px);font-weight:900;letter-spacing:-.07em;line-height:.88;margin-bottom:32px}
.hero-name .dot{color:#2563eb;-webkit-text-fill-color:#2563eb}
.hero-data{display:grid;grid-template-columns:1fr 1fr;gap:0 40px;margin-bottom:32px}
@media(max-width:580px){.hero-data{grid-template-columns:1fr}}
.hd-row{display:flex;flex-direction:column;gap:3px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.hd-label{font-size:9px;font-weight:700;color:#3a3a3e;-webkit-text-fill-color:#3a3a3e;text-transform:uppercase;letter-spacing:1.5px}
.hd-value{font-size:14px;font-weight:600;color:#86868b;-webkit-text-fill-color:#86868b}
.hd-value a{color:#2563eb;-webkit-text-fill-color:#2563eb;transition:opacity .3s}
.hd-value a:hover{opacity:.7}
.hero-cta{display:flex;gap:10px;flex-wrap:wrap}
.btn-p{background:linear-gradient(135deg,#2563eb,#6366f1);color:#fff;-webkit-text-fill-color:#fff;padding:14px 28px;border-radius:10px;font-size:14px;font-weight:600;transition:all .3s cubic-bezier(.22,1,.36,1)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,99,235,.3)}
.btn-gh{color:#71717a;-webkit-text-fill-color:#71717a;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;border:1px solid rgba(255,255,255,.06);transition:all .3s cubic-bezier(.22,1,.36,1)}
.btn-gh:hover{color:#eeeef0;-webkit-text-fill-color:#eeeef0;border-color:rgba(99,102,241,.2);transform:translateY(-2px)}

/* ═══ NEBULA 2: AURORA DRIFT ═══
   Elongated, ribbon-like shapes instead of circles.
   Feels like northern lights / aurora borealis.
   Horizontal bands that undulate and weave through each other.
   More structured than random blobs. Cinematic. */
.neb-wrap{position:absolute;right:0;top:0;bottom:0;width:55%;opacity:0;animation:nebIn 2.5s cubic-bezier(.22,1,.36,1) .2s forwards}
@keyframes nebIn{from{opacity:0}to{opacity:1}}
@media(max-width:900px){.neb-wrap{position:absolute;right:-10%;top:auto;bottom:-5%;width:120%;height:300px;animation-name:nebInMob}@keyframes nebInMob{from{opacity:0}to{opacity:1}}}

/* Ribbons - wide ellipses stretched horizontally */
.rib{position:absolute;border-radius:50%;will-change:transform}

/* Base layer - wide, very soft */
.rib-1{width:120%;height:30%;top:20%;left:-10%;background:radial-gradient(ellipse at 50% 50%,rgba(30,64,175,.15),transparent 70%);filter:blur(60px);animation:wave1 18s ease-in-out infinite}
.rib-2{width:100%;height:25%;top:50%;left:-5%;background:radial-gradient(ellipse at 50% 50%,rgba(67,56,202,.12),transparent 65%);filter:blur(55px);animation:wave2 22s ease-in-out infinite}
.rib-3{width:110%;height:20%;top:35%;left:-15%;background:radial-gradient(ellipse at 50% 50%,rgba(37,99,235,.13),transparent 60%);filter:blur(50px);animation:wave3 15s ease-in-out infinite}

/* Mid layer - brighter, tighter ribbons */
.rib-4{width:80%;height:15%;top:30%;left:10%;background:radial-gradient(ellipse,rgba(37,99,235,.25),transparent 65%);filter:blur(30px);animation:wave4 12s ease-in-out infinite}
.rib-5{width:70%;height:12%;top:45%;left:15%;background:radial-gradient(ellipse,rgba(99,102,241,.28),transparent 60%);filter:blur(25px);animation:wave5 14s ease-in-out infinite}
.rib-6{width:60%;height:10%;top:55%;left:20%;background:radial-gradient(ellipse,rgba(79,70,229,.22),transparent 55%);filter:blur(22px);animation:wave6 10s ease-in-out infinite}

/* Bright thread - thin, vivid */
.rib-7{width:50%;height:6%;top:38%;left:25%;background:radial-gradient(ellipse,rgba(129,140,248,.3),transparent 60%);filter:blur(12px);animation:wave7 8s ease-in-out infinite}
.rib-8{width:40%;height:4%;top:48%;left:30%;background:radial-gradient(ellipse,rgba(165,180,252,.2),transparent 55%);filter:blur(8px);animation:wave8 9s ease-in-out infinite}

/* Hot core streak */
.rib-core{width:25%;height:3%;top:42%;left:35%;background:radial-gradient(ellipse,rgba(199,210,254,.25),transparent 60%);filter:blur(5px);animation:wavePulse 6s ease-in-out infinite}

@keyframes wave1{0%,100%{transform:translateY(0) scaleY(1) rotate(-2deg)}33%{transform:translateY(30px) scaleY(1.15) rotate(1deg)}66%{transform:translateY(-20px) scaleY(.9) rotate(-1deg)}}
@keyframes wave2{0%,100%{transform:translateY(0) scaleY(1) rotate(1deg)}40%{transform:translateY(-25px) scaleY(1.2) rotate(-2deg)}75%{transform:translateY(20px) scaleY(.85) rotate(2deg)}}
@keyframes wave3{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(35px) scaleY(1.1) rotate(1deg)}}
@keyframes wave4{0%,100%{transform:translateY(0) scaleX(1)}35%{transform:translateY(15px) scaleX(1.1) rotate(-1deg)}70%{transform:translateY(-12px) scaleX(.95) rotate(1deg)}}
@keyframes wave5{0%,100%{transform:translateY(0) scaleX(1)}50%{transform:translateY(-18px) scaleX(1.08) rotate(1deg)}}
@keyframes wave6{0%,100%{transform:translateY(0)}40%{transform:translateY(20px) rotate(-1deg)}80%{transform:translateY(-10px) rotate(1deg)}}
@keyframes wave7{0%,100%{transform:translateY(0) scaleX(1)}50%{transform:translateY(10px) scaleX(1.15)}}
@keyframes wave8{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px) scaleX(1.1)}}
@keyframes wavePulse{0%,100%{opacity:.4;transform:scaleX(1)}50%{opacity:1;transform:scaleX(1.3)}}

.option-label{position:fixed;bottom:16px;left:16px;background:#1c1c1e;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 16px;font-size:11px;font-weight:700;color:#2563eb;-webkit-text-fill-color:#2563eb;z-index:100}
.back{position:fixed;bottom:16px;right:16px;background:#1c1c1e;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 16px;font-size:11px;font-weight:700;color:#55555f;-webkit-text-fill-color:#55555f;z-index:100;transition:all .3s}
.back:hover{color:#eeeef0;-webkit-text-fill-color:#eeeef0}
</style>
</head>
<body>

<div class="hd-row"><span class="hd-label">Current</span><span class="hd-value"><a href="https://superpositioncap.com" target="_blank">Superposition</a>, <a href="https://askfulcrum.com" target="_blank">Fulcrum</a></span></div>
<div class="hd-row"><span class="hd-label">Focus</span><span class="hd-value">AI, Regulated Industries, Legal Tech</span></div>
</div>
<div class="hero-cta">
<a href="https://linkedin.com/in/dbron" target="_blank" class="btn-p">LinkedIn</a>

</div>
</div>

<div class="neb-wrap">
<div class="rib rib-1"></div>

<div class="rib rib-5"></div>
<div class="rib rib-6"></div>
<div class="rib rib-7"></div>
<div class="rib rib-8"></div>
<div class="rib rib-core"></div>
</div>
</section>
</body>
</html>
